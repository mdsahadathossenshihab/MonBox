<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonBox</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%2280%22 height=%2280%22 x=%2210%22 y=%2210%22 rx=%2220%22 fill=%22%2300796B%22/><path d=%22M30 40h40M30 50h40M30 60h20%22 stroke=%22white%22 stroke-width=%228%22 stroke-linecap=%22round%22/></svg>">
    <script>
      // Global error handler to catch non-fatal polyfill errors as early as possible
      (function() {
        var suppressFetchError = function(event) {
          var message = (event.message || (event.reason && event.reason.message) || '').toLowerCase();
          if (message.indexOf('cannot set property fetch') !== -1 || 
              message.indexOf('fetch of #<window>') !== -1 ||
              message.indexOf('only a getter') !== -1 ||
              message.indexOf('fetch is read-only') !== -1) {
            if (event.preventDefault) event.preventDefault();
            if (event.stopPropagation) event.stopPropagation();
            return true;
          }
          return false;
        };

        window.addEventListener('error', suppressFetchError, true);
        window.addEventListener('unhandledrejection', suppressFetchError, true);

        // Pre-emptively define a dummy setter for fetch if it's a read-only getter
        try {
          var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && !descriptor.writable && !descriptor.set && descriptor.configurable) {
            var originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { /* Ignore attempts to overwrite fetch */ },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {}

        // Also intercept console.error for this specific message to keep the console clean
        var originalConsoleError = console.error;
        console.error = function() {
          var args = Array.prototype.slice.call(arguments);
          var msg = args.join(' ').toLowerCase();
          if (msg.indexOf('cannot set property fetch') !== -1 || 
              msg.indexOf('fetch of #<window>') !== -1 ||
              msg.indexOf('only a getter') !== -1) {
            return;
          }
          originalConsoleError.apply(console, args);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
